name: invoiceninja

x-logging: &default-logging
  options:
    max-size: "10m"
    max-file: "3"
  driver: json-file

x-app-volumes: &volumes
  volumes:
      - ./.env:/app/.env
      - app_cache:/var/www/html/bootstrap/cache
      - app_storage:/app/storage
      - caddy_data:/data

services:
  app:
    image: invoiceninja/invoiceninja:5-octane
    restart: unless-stopped
    command: --port=80 --workers=2 --log-level=info
    # command: --host=example.com --port=443 --workers=2 --https --http-redirect --log-level=info
    ports:
      - "80:80" # HTTP
      # - "443:443" # HTTPS
      # - "443:443/udp" # HTTP/3, Works for chromium based browser, but causes H3_GENERAL_PROTOCOL_ERROR for pdf previews in Firefox 
    env_file:
      - ./.env
    <<: *volumes
    healthcheck:
      start_period: 10s
    depends_on:
      mariadb:
        condition: service_healthy
      valkey:
        condition: service_healthy
    logging: *default-logging
    # tty: true

  scheduler:
    image: invoiceninja/invoiceninja:5-octane-scheduler
    restart: unless-stopped
    command: --verbose
    env_file:
      - ./.env
    <<: *volumes
    depends_on:
      app:
        condition: service_healthy
    logging: *default-logging

  worker:
    image: invoiceninja/invoiceninja:5-octane-worker
    restart: unless-stopped
    command: --verbose --sleep=3 --tries=3 --max-time=3600
    deploy:
      mode: replicated
      replicas: 2
    env_file:
      - ./.env
    <<: *volumes
    depends_on:
      app:
        condition: service_healthy
    logging: *default-logging

  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mariadb:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
    logging: *default-logging

  valkey:
    image: valkey/valkey:8
    restart: unless-stopped
    volumes:
      - valkey:/data
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      start_period: 10s
    logging: *default-logging

volumes:
  app_cache:
  app_storage:
  caddy_data:
  mariadb:
  valkey:
